version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-dev
    container_name: pokemon-team-builder-backend
    environment:
      - PORT=4000
    ports:
      - '4000:4000'
    volumes:
      - ./backend:/app/backend
      - backend_node_modules:/app/backend/node_modules
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health']
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-dev
    container_name: pokemon-team-builder-frontend
    environment:
      - VITE_API_PROXY_TARGET=http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules

volumes:
  backend_node_modules:
  frontend_node_modules:
