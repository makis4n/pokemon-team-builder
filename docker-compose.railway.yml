version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    environment:
      - PORT=4000
    ports:
      - '4000:4000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health']
      interval: 10s
      timeout: 3s
      retries: 5
